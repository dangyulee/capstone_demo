{% extends 'base.html' %}

{% block title %}내보내기{% endblock %}

{% block content %}
<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">내보내기</h1>
    <p class="page-desc">프로젝트 결과물을 다양한 형태로 내보냅니다.</p>
  </div>

  <div class="export-grid">
    <div class="export-card coming-soon-card">
      <div class="export-icon">📄</div>
      <h3 class="export-card-title">보고서 작성</h3>
      <p class="export-card-desc">프로젝트 내용을 바탕으로 보고서를 자동 생성합니다.</p>
      <div class="coming-soon-badge">구현 예정입니다</div>
    </div>

    <div class="export-card coming-soon-card">
      <div class="export-icon">📊</div>
      <h3 class="export-card-title">PPT 생성 · 발표</h3>
      <p class="export-card-desc">발표용 파워포인트 슬라이드를 자동으로 생성합니다.</p>
      <div class="coming-soon-badge">구현 예정입니다</div>
    </div>

    <div class="export-card coming-soon-card">
      <div class="export-icon">🎙️</div>
      <h3 class="export-card-title">대본 생성</h3>
      <p class="export-card-desc">발표 대본을 AI가 자동으로 작성합니다.</p>
      <div class="coming-soon-badge">구현 예정입니다</div>
    </div>
  </div>
</div>
{% endblock %}
