{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="auth-logo-sub">팀프로젝트</span><br>
        <span class="auth-logo-main">자료조사 검증 서비스</span>
      </div>
      <h2 class="auth-title">로그인</h2>

      {% if form.errors %}
      <div class="alert-error">아이디 또는 비밀번호가 올바르지 않습니다.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <div class="form-group">
          <label class="form-label">아이디</label>
          <input type="text" name="username" class="form-input" autofocus required>
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input type="password" name="password" class="form-input" required>
        </div>
        <button type="submit" class="btn-primary btn-full">로그인</button>
      </form>

      <p class="auth-footer">
        계정이 없으신가요? <a href="{% url 'signup' %}" class="auth-link">회원가입</a>
      </p>
    </div>
  </div>
</body>
</html>
